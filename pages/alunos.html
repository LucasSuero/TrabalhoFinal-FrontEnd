<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/alunos.css">
    <title>Alunos</title>
</head>
<body>
     <div id="header"></div>

<main class="mainFlex">
    <div class="tabela">
        <button id="abrirModal" class="cadastrarAlunoBtn">Cadastrar Aluno</button>
        <table>
            <thead>
                <tr><!-- <span class="sort-icon">&#8645;</span>  é a seta pra cima e pra baixo usado pra trocar a ordem dos elementos na tabela-->
                    <th id="ordNome">Aluno  <span class="sort-icon">&#8645;</span></th>
                    <th id="ordCurso">Curso  <span class="sort-icon">&#8645;</span></th>
                    <th id="ordSemestre">Semestre  <span class="sort-icon">&#8645;</span></th>
                    <th id="ordMedia">Media  <span class="sort-icon">&#8645;</span></th>
                    <th id="ordSituacao">Situação  <span class="sort-icon">&#8645;</span></th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabelaAlunos">

            </tbody>
        </table>

                
            <div id="modal" class="modal">
                <div class="modalContent">
                    <div class="tituloModal">
                        <h2>Novo Aluno</h2>
                    </div>
                        <div>
                            <label for="nome">Nome do aluno:</label><br>
                            <input class="nome" type="text" id="nome" placeholder="Nome do aluno"><br>
                        </div><br>
                        <div>
                            <label for="nascimento">Data de nascimento:</label><br>
                            <input class="data" type="date" id="nascimento">
                        </div><br>
                        <div class="flex">
                            <div>
                                <label for="curso">Curso do aluno:</label><br>
                                <input class="curso" type="text" id="curso" placeholder="Curso do aluno">
                            </div><br>
                            <div>
                                <label for="semestre">Semestre</label><br>
                                <input class="semestre" type="number" id="semestre" placeholder="3" min="1" max="12"><br>
                            </div>
                        </div><br>
                        <div>
                            <label for="notas"></label><br>
                                    <input class="notas" type="hidden" id="nota1">
                                    <input class="notas" type="hidden" id="nota2"><br>
                                    <button class="cancelar" id="fecharModal">Cancelar</button>
                                    <button class="salvar" id="salvarCadastro">Salvar</button>
                        </div>                 
                </div>
            </div>
    
    </div>

    <img src="/img/alunos.jpg" alt="" class="imgPrincipal">
</main>
     
     <div id="footer"></div>
    <script src="../js/aluno.js"></script>
    <script src="../js/includes/header.js"></script>
    <script src="../js/includes/footer.js"></script>
</body>
</html>
